<svg xmlns="http://www.w3.org/2000/svg" width="36" height="16" viewBox="0 0 36 16" shape-rendering="crispEdges">
  <!-- Thin pampa ribbon tile: cream + forest green -->
  <rect width="36" height="16" fill="#F5F0E8"/>

  <g fill="#2D4A3E">
    <!-- Frame -->
    <rect width="36" height="1"/>
    <rect y="15" width="36" height="1"/>
    <rect width="1" height="16"/>
    <rect x="35" width="1" height="16"/>

    <!-- Axis -->
    <rect x="1" y="7" width="34" height="2"/>

    <!-- Left cross (half, tiles seamlessly) -->
    <rect x="4" y="4" width="2" height="2"/>
    <rect x="4" y="10" width="2" height="2"/>
    <rect x="6" y="6" width="2" height="4"/>

    <!-- Hollow stepped diamond -->
    <rect x="16" y="2" width="4" height="1"/>
    <rect x="15" y="3" width="6" height="1"/>
    <rect x="14" y="4" width="8" height="1"/>
    <rect x="13" y="5" width="2" height="1"/>
    <rect x="21" y="5" width="2" height="1"/>
    <rect x="13" y="6" width="2" height="2"/>
    <rect x="21" y="6" width="2" height="2"/>
    <rect x="13" y="8" width="2" height="2"/>
    <rect x="21" y="8" width="2" height="2"/>
    <rect x="13" y="10" width="2" height="1"/>
    <rect x="21" y="10" width="2" height="1"/>
    <rect x="14" y="11" width="8" height="1"/>
    <rect x="15" y="12" width="6" height="1"/>
    <rect x="16" y="13" width="4" height="1"/>

    <!-- Right cross (half) -->
    <rect x="30" y="4" width="2" height="2"/>
    <rect x="30" y="10" width="2" height="2"/>
    <rect x="28" y="6" width="2" height="4"/>
  </g>
</svg>
